<!DOCTYPE html>
<html>

<head>
<title>User Profile</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h2>User Profile</h2>

<div id="profile"></div>

</div>

<script>

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

async function loadProfile(){

const res=await fetch("/profile/"+id)

const user=await res.json()

const container=document.getElementById("profile")

container.innerHTML=`

<div class="card">

<h3>${user.name}</h3>

<p>Email: ${user.email}</p>

<p>
Offers:
${user.skillsOffered.map(s=>`<span class="skill">${s}</span>`).join("")}
</p>

<p>
Wants:
${user.skillsWanted.map(s=>`<span class="skill">${s}</span>`).join("")}
</p>

<a href="chat.html">
<button class="btn btn-green">Open Chat</button>
</a>

</div>

`

}

loadProfile()

</script>

</body>
</html>
